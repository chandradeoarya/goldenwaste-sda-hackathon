name: Java Spring Boot CI/CD to AWS EC2

on:
  push:
    branches:
      - ga-cicd-bm

jobs:
  build:
    name: Build and Deploy
    runs-on: ubuntu-latest

    steps:
    
    # Step 1: Checkout the repository
    - name: Checkout Code
      uses: actions/checkout@v4

    # Step 2: Set up JDK
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    # Step 3: Build the application using Maven
    - name: Build with Maven
      run: mvn clean package -DskipTests

    # Step 4: Zip the entire target folder
    - name: Zip Target Directory
      run: zip -r target.zip target/

    # Step 5: Configure AWS Credentials
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1

    # Step 6: Upload ZIP file to S3
    - name: Upload ZIP to S3
      run: aws s3 cp target.zip s3://${{ secrets.AWS_S3_BUCKET }}/golden/target.zip

    # Step 7: Deploy to AWS EC2 via SSH
    - name: Deploy to AWS EC2
      uses: appleboy/ssh-action@v0.1.10
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          # Navigate to deployment directory
          cd /home/${{ secrets.EC2_USER }}/app

          # Remove previous target folder and zip file
          rm -rf target
          rm -f target.zip

          # Download new ZIP file from S3
          aws s3 cp s3://${{ secrets.AWS_S3_BUCKET }}/golden/target.zip target.zip

          # Unzip the target directory
          unzip target.zip

          # Start the Java application
          java -jar target/goldenwaste.jar